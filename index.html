<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/css/output.css" rel="stylesheet">
</head>

<body>
    <div class="add-product fixed -right-1">
        <button class="bg-purple-500 px-6 py-1 rounded-md hover:cursor-pointer">Add Product</button>
    </div>

    <div class="container mx-auto max-w-[70vw] my-5">
        <div
            class="product-list grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 items-center justify-start mt-4">

        </div>
    </div>


    <div class="fixed inset-0 bg-black/80 z-200 modal-keeper hidden">
        <div class="modal">
            <button class="close absolute top-2 right-4 text-xl text-purple-600 hover:cursor-pointer">
                ✕
            </button>

            <div class="modal-body">
                <div class="flex flex-col mx-auto mb-4">
                    <label class="text-white">title</label>
                    <input class="title inputForm" type="text">
                </div>

                <div class="flex flex-col mx-auto mb-4">
                    <label class="text-white">price</label>
                    <input class="price inputForm" type="number">
                </div>

                <div class="flex flex-col mx-auto mb-4">
                    <label class="text-white">image</label>
                    <input class="image inputForm" type="file">
                </div>

                <div class="flex flex-col mx-auto mb-4">
                    <label class="text-white">background</label>
                    <select class="background inputForm">
                        <option value="purple">purple</option>
                        <option value="yellow">yellow</option>
                        <option value="teal">teal</option>
                        <option value="orange">orange</option>
                        <option value="red">red</option>
                        <option value="blue">blue</option>
                        <option value="pink">pink</option>
                        <option value="green">green</option>
                    </select>
                </div>

                <div class="flex justify-between w-full">
                    <button class="create bg-purple-500 px-6 py-1 rounded-md hover:cursor-pointer">create</button>
                    <button
                        class="close text-white bg-red-500 px-6 py-1 rounded-md hover:cursor-pointer">cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/js/app.js"></script>
</body>

</html>
